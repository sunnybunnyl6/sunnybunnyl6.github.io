<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://jsdelivr.net" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <title>My Interactive Study Hub</title>
    <style>
        .controls { background: #333; color: white; padding: 10px; position: sticky; top: 0; z-index: 1000; display: flex; gap: 10px; }
        .btn { background: #4facfe; border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-danger { background: #ff4b2b; }
    </style>
</head>
<body>
    <!-- 1. Control Panel for the User -->
    <div class="controls">
        <button class="btn" onclick="addNewTile()">+ Add Task Tile</button>
        <button class="btn" onclick="saveFullLayout()">Save Layout</button>
        <button class="btn btn-danger" onclick="clearLayout()">Reset All</button>
    </div>

    <div class="grid-stack"></div>

    <script src="https://jsdelivr.net"></script>
    <script>
        // Initialize GridStack with drag-and-drop enabled
        let grid = GridStack.init({ float: true, margin: 10 });

        // 2. Add New Tile Function
        function addNewTile() {
            grid.addWidget({w: 3, h: 2, content: `
                <div class="grid-stack-item-content">
                    <h3 contenteditable="true">New Task</h3>
                    <p contenteditable="true">Click here to edit your notes.</p>
                </div>`
            });
        }

        // 3. Persistent Storage Logic
        function saveFullLayout() {
            let data = grid.save();
            localStorage.setItem('user-study-grid', JSON.stringify(data));
            alert("Layout Saved Locally!");
        }

        function loadSavedLayout() {
            let saved = localStorage.getItem('user-study-grid');
            if (saved) {
                grid.load(JSON.parse(saved));
            } else {
                // Default tiles if nothing is saved
                addNewTile();
            }
        }

        function clearLayout() {
            localStorage.removeItem('user-study-grid');
            location.reload();
        }

        // Initialize on load
        loadSavedLayout();
        grid.on('change', saveFullLayout); // Auto-save on every move
    </script>
</body>
</html>
