<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Study Dashboard</title>
    <!-- Dependencies -->
    <link href="https://jsdelivr.net" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <!-- SIDEBAR: Expandable icons-only menu -->
    <nav class="sidebar">
        <div class="sidebar-header">
            <i data-lucide="layout-dashboard" class="logo-icon"></i>
            <span class="logo-text">StudyHub</span>
        </div>
        
        <div class="menu-items">
            <button class="menu-btn" onclick="addNoteTile()" title="Add Note">
                <i data-lucide="file-text"></i>
                <span class="btn-text">New Note</span>
            </button>
            <button class="menu-btn" onclick="addEmbedTile()" title="Embed Media">
                <i data-lucide="link-2"></i>
                <span class="btn-text">Embed Link</span>
            </button>
            
            <div class="divider"></div>
            
            <div class="color-picker-group">
                <label><i data-lucide="palette"></i> <span class="label-text">Tile Color</span></label>
                <input type="color" id="tileColor" value="#ffffff" oninput="updateUI()">
            </div>
            
            <div class="color-picker-group">
                <label><i data-lucide="image"></i> <span class="label-text">Background</span></label>
                <input type="color" id="bgColor" value="#e0eafc" oninput="updateUI()">
            </div>
        </div>

        <button class="menu-btn btn-danger" onclick="resetAll()">
            <i data-lucide="trash-2"></i>
            <span class="btn-text">Reset All</span>
        </button>
    </nav>

    <!-- MAIN DASHBOARD -->
    <main class="grid-stack"></main>

    <!-- Scripts -->
    <script src="https://jsdelivr.net"></script>
    <script>
        // 1. Initialize Gridstack
        let grid = GridStack.init({ 
            float: true, 
            margin: 12, 
            cellHeight: 80,
            animate: true
        });

        // 2. Tile Templates
        function addNoteTile() {
            grid.addWidget({ w: 4, h: 4, content: `
                <div class="grid-stack-item-content glass-tile">
                    <button class="delete-btn" onclick="grid.removeWidget(this.parentElement.parentElement)">&times;</button>
                    <h3 contenteditable="true" class="tile-title">Untitled Note</h3>
                    <div contenteditable="true" class="note-body">Start typing your homework tasks...</div>
                </div>` 
            });
            lucide.createIcons();
        }

        function addEmbedTile() {
            let url = prompt("Paste your Spotify, YouTube, or Widget link:");
            if (!url) return;
            
            // Basic link conversion for xTiles-like embedding
            let finalUrl = url.replace("watch?v=", "embed/").replace("://spotify.com", "://spotify.comembed/");

            grid.addWidget({ w: 4, h: 6, content: `
                <div class="grid-stack-item-content glass-tile">
                    <button class="delete-btn" onclick="grid.removeWidget(this.parentElement.parentElement)">&times;</button>
                    <iframe src="${finalUrl}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
                </div>` 
            });
        }

        // 3. Auto-Save Logic
        function saveAll() {
            const data = grid.save(false);
            localStorage.setItem('study-dashboard-v2', JSON.stringify(data));
            localStorage.setItem('study-bg-v2', document.body.style.backgroundColor);
        }

        function loadAll() {
            const saved = localStorage.getItem('study-dashboard-v2');
            const bg = localStorage.getItem('study-bg-v2');
            if (saved) grid.load(JSON.parse(saved));
            if (bg) document.body.style.backgroundColor = bg;
            lucide.createIcons();
        }

        function updateUI() {
            const tileC = document.getElementById('tileColor').value;
            const bgC = document.getElementById('bgColor').value;
            document.body.style.backgroundColor = bgC;
            document.querySelectorAll('.glass-tile').forEach(t => t.style.backgroundColor = hexToRgba(tileC, 0.7));
            saveAll();
        }

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function resetAll() { if(confirm("This will delete all tiles and notes. Proceed?")) { localStorage.clear(); location.reload(); } }

        grid.on('change', saveAll);
        document.addEventListener('input', saveAll);
        window.onload = () => { loadAll(); lucide.createIcons(); };
    </script>
</body>
</html>
