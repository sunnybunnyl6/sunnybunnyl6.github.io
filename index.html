<div class="settings-sidebar">
    <h3>🎨 Design Hub</h3>
    
    <label>Tile Colors</label>
    <input type="color" value="#ffffff" oninput="updateTileColors(this.value)">
    
    <label>Page Background</label>
    <input type="color" value="#f4f7f6" oninput="updatePageBg(this.value)">
    
    <label>Sidebar Theme</label>
    <select onchange="updateSidebarTheme(this.value)" style="width:100%; padding:8px;">
        <option value="#2c3e50">Midnight Blue</option>
        <option value="#1a1a1a">Dark Mode</option>
        <option value="#ffffff">Light Mode</option>
    </select>
</div>

<div class="grid-stack">
    <!-- Your study tiles go here -->
</div>
